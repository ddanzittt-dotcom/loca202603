<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>LOCA · 앱 구현 현황 — MVP 완성</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css" />
<style>
  :root {
    --ember-500: #E26F3C;
    --ember-50:  #FDF3EA;
    --ember-300: #F2A57B;
    --moss-100: #E3EAE0;
    --moss-600: #4A6B52;
    --ink-900: #1F1B16;
    --ink-700: #58524A;
    --ink-500: #908A80;
    --paper-200: #EFE9DD;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: #FFFFFF;
    font-family: 'Pretendard Variable', Pretendard, system-ui, sans-serif;
    color: var(--ink-900);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    letter-spacing: -0.01em;
  }
  /* PDF page = 1920×1080 (16:9 FHD) */
  .slide {
    width: 1920px;
    height: 1080px;
    padding: 80px 96px 64px;
    position: relative;
    background: #FFFFFF;
    display: flex;
    flex-direction: column;
  }

  .header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 48px;
  }
  h1 {
    font-weight: 800;
    font-size: 52px;
    line-height: 1.1;
    letter-spacing: -0.035em;
    color: var(--ink-900);
  }
  .sub {
    font-size: 20px;
    font-weight: 500;
    color: var(--ink-700);
    margin-top: 14px;
    letter-spacing: -0.015em;
  }
  .ember-line {
    font-size: 20px;
    font-weight: 700;
    color: var(--ember-500);
    margin-top: 18px;
    letter-spacing: -0.015em;
  }
  .badges {
    display: flex;
    gap: 12px;
    flex-shrink: 0;
    margin-top: 8px;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 18px;
    border-radius: 999px;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.01em;
    border: 1px solid;
  }
  .badge.moss {
    background: var(--moss-100);
    border-color: #BFD2BD;
    color: var(--moss-600);
  }
  .badge.ember {
    background: var(--ember-50);
    border-color: var(--ember-300);
    color: var(--ember-500);
  }
  .badge-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  .phones {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 40px;
    align-items: end;
    padding-bottom: 16px;
  }
  .phone-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 22px;
  }
  .phone-item img {
    height: 700px;
    width: auto;
    display: block;
    object-fit: contain;
  }
  .phone-item .label {
    font-weight: 700;
    font-size: 24px;
    color: var(--ink-900);
    letter-spacing: -0.025em;
  }

  /* footer hint (optional) */
  .footer-mark {
    position: absolute;
    bottom: 32px;
    right: 96px;
    font-size: 14px;
    color: var(--ink-500);
    font-weight: 500;
    letter-spacing: 0.04em;
  }
</style>
</head>
<body>
  <div class="slide">
    <header class="header">
      <div>
        <h1>앱 구현 현황 — MVP 완성</h1>
        <p class="sub">16개 핵심 화면 프로토타입 완성</p>
        <p class="ember-line">LOCA 앱의 핵심 화면 구현 완료 · Pretendard 폰트 · 5탭 네비게이션</p>
      </div>
      <div class="badges">
        <span class="badge moss">✓ MVP 완성</span>
        <span class="badge ember"><span class="badge-dot" style="background:var(--ember-500)"></span>테스트 중</span>
      </div>
    </header>

    <div class="phones">
      <div class="phone-item">
        <img src="../ir-images/01-home.png" alt="홈 화면" />
        <div class="label">홈</div>
      </div>
      <div class="phone-item">
        <img src="../ir-images/06-community-map.png" alt="모두의 지도" />
        <div class="label">모두의 지도</div>
      </div>
      <div class="phone-item">
        <img src="../ir-images/05-map-editor.png" alt="예산 지도" />
        <div class="label">예산 지도</div>
      </div>
      <div class="phone-item">
        <img src="../ir-images/16-event-map.png" alt="독립기념관 따숨마켓" />
        <div class="label">독립기념관 따숨마켓</div>
      </div>
    </div>

    <div class="footer-mark">LOCA · 2026 · IR DECK</div>
  </div>
</body>
</html>
