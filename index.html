<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#FAF8F2" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" crossorigin />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="LOCA" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="LOCA - 웹 지도 작업 공간" />
    <meta property="og:description" content="지도 제작, 장소 기록, 프로필 공개를 한 화면에서 관리하세요." />
    <meta property="og:site_name" content="LOCA" />
    <meta property="og:locale" content="ko_KR" />
    <title>LOCA | 웹 지도 작업 공간</title>
    <script>
      // Suppress Naver Maps SDK cross-origin errors from crashing React.
      window.onerror = function(message, source) {
        if (!source || source === '' || message === 'Script error.') {
          return true;
        }
      };
      window.addEventListener('error', function(e) {
        if (!e.filename || e.filename === '' || e.message === 'Script error.') {
          e.stopImmediatePropagation();
          e.preventDefault();
          return true;
        }
      }, true);

      window.__naverMapReady = false;
      window.__naverMapLoading = false;
      window.__naverMapCallbacks = [];
      window.loadNaverMap = function(cb) {
        if (window.__naverMapReady) { if (cb) cb(true); return; }
        if (cb) window.__naverMapCallbacks.push(cb);
        if (window.__naverMapLoading) return;
        window.__naverMapLoading = true;
        var s = document.createElement('script');
        var naverKey = window.__NAVER_MAP_KEY || 'x5bkbkzlrw';
        s.src = 'https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=' + naverKey + '&submodules=geocoder,gl';
        s.onload = function() {
          var attempts = 0;
          var maxAttempts = 20;
          var minAttempts = 12;
          var poll = setInterval(function() {
            attempts++;
            var authFailed = typeof naver !== 'undefined' && naver.maps == null;
            if (authFailed) {
              clearInterval(poll);
              window.__naverMapReady = false;
              window.__naverMapCallbacks.forEach(function(fn) { fn(false); });
              window.__naverMapCallbacks = [];
              return;
            }
            if (attempts >= maxAttempts) {
              clearInterval(poll);
              var ok = typeof naver !== 'undefined' && naver.maps != null && typeof naver.maps.Map === 'function';
              window.__naverMapReady = ok;
              window.__naverMapCallbacks.forEach(function(fn) { fn(ok); });
              window.__naverMapCallbacks = [];
              return;
            }
            if (attempts >= minAttempts) {
              var authOk = typeof naver !== 'undefined' && naver.maps != null && typeof naver.maps.Map === 'function';
              if (authOk) {
                clearInterval(poll);
                window.__naverMapReady = true;
                window.__naverMapCallbacks.forEach(function(fn) { fn(true); });
                window.__naverMapCallbacks = [];
              }
            }
          }, 200);
        };
        s.onerror = function() {
          window.__naverMapCallbacks.forEach(function(fn) { fn(false); });
          window.__naverMapCallbacks = [];
          window.__naverMapLoading = false;
        };
        document.head.appendChild(s);
      };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
