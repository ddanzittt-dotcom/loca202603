    <script>
      // Suppress Naver Maps SDK cross-origin errors from crashing React.
      window.onerror = function(message, source) {
        if (!source || source === '' || message === 'Script error.') {
          return true;
        }
      };
      window.addEventListener('error', function(e) {
        if (!e.filename || e.filename === '' || e.message === 'Script error.') {
          e.stopImmediatePropagation();
          e.preventDefault();
          return true;
        }
      }, true);

      window.__naverMapReady = false;
      window.__naverMapLoading = false;
      window.__naverMapCallbacks = [];
      window.loadNaverMap = function(cb) {
        if (window.__naverMapReady) { if (cb) cb(true); return; }
        if (cb) window.__naverMapCallbacks.push(cb);
        if (window.__naverMapLoading) return;
        window.__naverMapLoading = true;
        var s = document.createElement('script');
        var naverKey = window.__NAVER_MAP_KEY || 'x5bkbkzlrw';
        s.src = 'https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=' + naverKey + '&submodules=geocoder,gl';
        s.onload = function() {
          var attempts = 0;
          var maxAttempts = 20;
          var minAttempts = 12;
          var poll = setInterval(function() {
            attempts++;
            var authFailed = typeof naver !== 'undefined' && naver.maps == null;
            if (authFailed) {
              clearInterval(poll);
              window.__naverMapReady = false;
              window.__naverMapCallbacks.forEach(function(fn) { fn(false); });
              window.__naverMapCallbacks = [];
              return;
            }
            if (attempts >= maxAttempts) {
              clearInterval(poll);
              var ok = typeof naver !== 'undefined' && naver.maps != null && typeof naver.maps.Map === 'function';
              window.__naverMapReady = ok;
              window.__naverMapCallbacks.forEach(function(fn) { fn(ok); });
              window.__naverMapCallbacks = [];
              return;
            }
            if (attempts >= minAttempts) {
              var authOk = typeof naver !== 'undefined' && naver.maps != null && typeof naver.maps.Map === 'function';
              if (authOk) {
                clearInterval(poll);
                window.__naverMapReady = true;
                window.__naverMapCallbacks.forEach(function(fn) { fn(true); });
                window.__naverMapCallbacks = [];
              }
            }
          }, 200);
        };
        s.onerror = function() {
          window.__naverMapCallbacks.forEach(function(fn) { fn(false); });
          window.__naverMapCallbacks = [];
          window.__naverMapLoading = false;
        };
        document.head.appendChild(s);
      };

      // ── 카카오맵 SDK 로더 (autoload=false → onload 후 kakao.maps.load) ──
      window.__kakaoMapReady = false;
      window.__kakaoMapLoading = false;
      window.__kakaoMapCallbacks = [];
      window.loadKakaoMap = function(cb) {
        if (window.__kakaoMapReady) { if (cb) cb(true); return; }
        if (cb) window.__kakaoMapCallbacks.push(cb);
        if (window.__kakaoMapLoading) return;
        window.__kakaoMapLoading = true;
        var key = window.__KAKAO_JS_KEY;
        if (!key) {
          window.__kakaoMapCallbacks.forEach(function(fn) { fn(false); });
          window.__kakaoMapCallbacks = [];
          window.__kakaoMapLoading = false;
          return;
        }
        var s = document.createElement('script');
        s.src = 'https://dapi.kakao.com/v2/maps/sdk.js?appkey=' + key + '&autoload=false&libraries=services';
        s.onload = function() {
          try {
            window.kakao.maps.load(function() {
              window.__kakaoMapReady = true;
              window.__kakaoMapCallbacks.forEach(function(fn) { fn(true); });
              window.__kakaoMapCallbacks = [];
            });
          } catch (e) {
            window.__kakaoMapCallbacks.forEach(function(fn) { fn(false); });
            window.__kakaoMapCallbacks = [];
          }
        };
        s.onerror = function() {
          window.__kakaoMapCallbacks.forEach(function(fn) { fn(false); });
          window.__kakaoMapCallbacks = [];
          window.__kakaoMapLoading = false;
        };
        document.head.appendChild(s);
      };
