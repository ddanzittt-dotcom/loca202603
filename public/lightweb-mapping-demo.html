<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>LOCA 라이트웹 맵핑 데모 (전체모드)</title>
    <style>
      :root {
        --ink: #2d4a3e;
        --chip: rgba(255, 255, 255, 0.95);
        --chip-border: rgba(230, 222, 210, 0.92);
        --accent: #ff6b35;
        --accent-soft: rgba(255, 232, 221, 0.92);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        font-family: "Pretendard", "Noto Sans KR", "Apple SD Gothic Neo", sans-serif;
        color: var(--ink);
        background: #efe9df;
      }

      .full-map {
        position: fixed;
        inset: 0;
        background: #f4ede3;
      }

      .map-stage {
        position: absolute;
        inset: 0;
        overflow: hidden;
      }

      .map-stage img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        filter: saturate(1.03) contrast(1.01);
      }

      .top-hud,
      .bottom-hud {
        position: absolute;
        left: 0;
        right: 0;
        z-index: 20;
        pointer-events: none;
      }

      .top-hud {
        top: 0;
        padding: calc(env(safe-area-inset-top) + 12px) 14px 12px;
        background: linear-gradient(to bottom, rgba(22, 26, 24, 0.34), rgba(22, 26, 24, 0));
      }

      .bottom-hud {
        bottom: 0;
        padding: 12px 14px calc(env(safe-area-inset-bottom) + 14px);
        background: linear-gradient(to top, rgba(22, 26, 24, 0.34), rgba(22, 26, 24, 0));
      }

      .hud-chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid rgba(241, 232, 223, 0.95);
        border-radius: 999px;
        padding: 9px 12px;
        font-size: 0.78rem;
        font-weight: 700;
        color: #2d4a3e;
        box-shadow: 0 8px 20px rgba(20, 25, 22, 0.13);
        backdrop-filter: blur(4px);
      }

      .bottom-hud .hud-chip {
        background: rgba(255, 107, 53, 0.94);
        border-color: rgba(255, 149, 107, 0.9);
        color: #fff;
      }

      .map-item {
        position: absolute;
        transform: translate(-50%, -50%);
        z-index: 12;
        min-width: 74px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 8px 11px;
        border-radius: 999px;
        background: var(--chip);
        border: 1px solid var(--chip-border);
        color: #2f3e37;
        font-size: 0.78rem;
        font-weight: 700;
        line-height: 1;
        letter-spacing: -0.01em;
        white-space: nowrap;
        box-shadow: 0 8px 18px rgba(36, 48, 43, 0.16);
        backdrop-filter: blur(2px);
      }

      .map-item--primary {
        background: var(--accent-soft);
        border-color: #ffc8b1;
      }

      .map-item::after {
        content: "";
        position: absolute;
        left: 50%;
        width: 11px;
        height: 11px;
        border-radius: 50%;
        transform: translateX(-50%);
        background: var(--accent);
        border: 2px solid #fff8f3;
        box-shadow: 0 2px 7px rgba(255, 107, 53, 0.45);
      }

      .dot-top::after {
        top: -13px;
      }

      .dot-bottom::after {
        bottom: -13px;
      }
    </style>
  </head>
  <body>
    <section class="full-map" aria-label="라이트웹 맵핑 전체 화면 데모">
      <div class="map-stage">
        <img src="/demo/event-map-prototype.png" alt="행사 맵 디자인 배경" />

        <span class="map-item map-item--primary dot-bottom" style="left: 44%; top: 36%;">메인무대</span>
        <span class="map-item dot-top" style="left: 41%; top: 27%;">안내</span>

        <span class="map-item dot-bottom" style="left: 56%; top: 45%;">부스 A</span>
        <span class="map-item dot-top" style="left: 61%; top: 50%;">부스 B</span>
        <span class="map-item dot-bottom" style="left: 67%; top: 54%;">부스 C</span>
        <span class="map-item dot-top" style="left: 54%; top: 58%;">부스 D</span>
        <span class="map-item dot-bottom" style="left: 59%; top: 64%;">부스 E</span>
        <span class="map-item dot-top" style="left: 65%; top: 68%;">부스 F</span>

        <span class="map-item map-item--primary dot-top" style="left: 35%; top: 47%;">푸드존 1</span>
        <span class="map-item map-item--primary dot-bottom" style="left: 52%; top: 72%;">푸드존 2</span>

        <span class="map-item dot-bottom" style="left: 72%; top: 30%;">화장실 1</span>
        <span class="map-item dot-top" style="left: 63%; top: 82%;">화장실 2</span>

        <span class="map-item dot-top" style="left: 77%; top: 90%;">입구 1</span>
        <span class="map-item dot-top" style="left: 24%; top: 88%;">입구 2</span>
      </div>

      <header class="top-hud">
        <span class="hud-chip">LOCA 라이트웹 전체모드</span>
      </header>

      <footer class="bottom-hud">
        <span class="hud-chip">프로토타입 맵핑 시안</span>
      </footer>
    </section>
  </body>
</html>
