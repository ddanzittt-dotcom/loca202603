<!DOCTYPE html>
<html lang='ko'>
<head>
<meta name='viewport' content='width=device-width, initial-scale=1'>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
.container {
  position: relative;
  width: 100%;
  max-width: 480px;
  height: 500px;
  margin: 0 auto;
  overflow: hidden;
  border-radius: 26px;
  background: #dde5f4;
}
.strip-outer {
  position: absolute;
  left: 12px;
  right: 12px;
  bottom: 14px;
  z-index: 510;
  height: 52px;
  background: rgba(255,0,0,0.1);
}
.strip-scroll {
  display: flex;
  gap: 8px;
  width: 100%;
  height: 100%;
  align-items: center;
  overflow-x: scroll;
  overflow-y: hidden;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.strip-scroll::-webkit-scrollbar { display: none; }
.card {
  flex: 0 0 130px;
  min-width: 130px;
  height: 42px;
  background: white;
  border-radius: 12px;
  border: 1px solid #ddd;
  display: flex;
  align-items: center;
  padding: 0 12px;
  font-size: 13px;
  cursor: pointer;
}
</style>
</head>
<body>
<h3 style='padding:10px'>스크롤 테스트 (div 버전)</h3>
<div class='container'>
  <div class='strip-outer'>
    <div class='strip-scroll'>
      <div class='card'>📍 장소 1</div>
      <div class='card'>☕ 장소 2</div>
      <div class='card'>🍽️ 장소 3</div>
      <div class='card'>🌳 장소 4</div>
      <div class='card'>🏖️ 장소 5</div>
      <div class='card'>🛍️ 장소 6</div>
      <div class='card'>📍 장소 7</div>
      <div class='card'>☕ 장소 8</div>
    </div>
  </div>
</div>
</body></html>
