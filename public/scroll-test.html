<!DOCTYPE html>
<html><head><style>
.parent {
  position: relative;
  width: 360px;
  height: 600px;
  overflow: hidden;
  border: 2px solid red;
  border-radius: 26px;
  background: #dde5f4;
}
.strip-outer {
  position: absolute;
  left: 12px;
  right: 68px;
  bottom: 14px;
  z-index: 510;
  height: 52px;
  overflow: hidden;
  border: 1px solid blue;
}
.strip-scroll {
  display: flex;
  gap: 8px;
  height: 100%;
  align-items: center;
  overflow-x: scroll;
  scrollbar-width: none;
  padding-right: 8px;
}
.card {
  flex: 0 0 130px !important;
  width: 130px !important;
  min-width: 130px !important;
  height: 42px;
  background: white;
  border-radius: 12px;
  border: 1px solid #ddd;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
}
</style></head>
<body>
<div class='parent'>
  <div class='strip-outer'>
    <div class='strip-scroll'>
      <button class='card'>장소 1</button>
      <button class='card'>장소 2</button>
      <button class='card'>장소 3</button>
      <button class='card'>장소 4</button>
      <button class='card'>장소 5</button>
      <button class='card'>장소 6</button>
      <button class='card'>장소 7</button>
    </div>
  </div>
</div>
<p>위 파란 박스 안에서 좌우 스크롤이 되는지 확인</p>
</body></html>
